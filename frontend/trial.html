<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Logo</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <div class="wrap">
    <svg
      class="logo"
      viewBox="0 0 2500 3449"
      xmlns="http://www.w3.org/2000/svg"
    >
      <defs>
        <!-- horizontal slices -->
        <clipPath id="slice1"><rect x="0" y="0" width="2500" height="700" /></clipPath>
        <clipPath id="slice2"><rect x="0" y="700" width="2500" height="700" /></clipPath>
        <clipPath id="slice3"><rect x="0" y="1400" width="2500" height="700" /></clipPath>
        <clipPath id="slice4"><rect x="0" y="2100" width="2500" height="700" /></clipPath>
        <clipPath id="slice5"><rect x="0" y="2800" width="2500" height="649" /></clipPath>
      </defs>

      <!-- blueprint -->
      <g class="blueprint">
        <path
          d="M0 0 C0.06058594 1.13179687 0.12117188 2.26359375 0.18359375 3.4296875 ... Z"
          transform="translate(2091,148)"
        />
        <path
          d="M0 0 C1.27294922 0.09216797 2.54589844 0.18433594 3.85742188 0.27929688 ... Z"
          transform="translate(157.55859375,663.20703125)"
        />
      </g>

      <!-- main sliced logo -->
      <g class="pieces">
        <g class="piece piece1" clip-path="url(#slice1)">
          <path
            d="M0 0 C0.06058594 1.13179687 0.12117188 2.26359375 0.18359375 3.4296875 ... Z"
            transform="translate(2091,148)"
          />
          <path
            d="M0 0 C1.27294922 0.09216797 2.54589844 0.18433594 3.85742188 0.27929688 ... Z"
            transform="translate(157.55859375,663.20703125)"
          />
        </g>

        <g class="piece piece2" clip-path="url(#slice2)">
          <path
            d="M0 0 C0.06058594 1.13179687 0.12117188 2.26359375 0.18359375 3.4296875 ... Z"
            transform="translate(2091,148)"
          />
          <path
            d="M0 0 C1.27294922 0.09216797 2.54589844 0.18433594 3.85742188 0.27929688 ... Z"
            transform="translate(157.55859375,663.20703125)"
          />
        </g>

        <g class="piece piece3" clip-path="url(#slice3)">
          <path
            d="M0 0 C0.06058594 1.13179687 0.12117188 2.26359375 0.18359375 3.4296875 ... Z"
            transform="translate(2091,148)"
          />
          <path
            d="M0 0 C1.27294922 0.09216797 2.54589844 0.18433594 3.85742188 0.27929688 ... Z"
            transform="translate(157.55859375,663.20703125)"
          />
        </g>

        <g class="piece piece4" clip-path="url(#slice4)">
          <path
            d="M0 0 C0.06058594 1.13179687 0.12117188 2.26359375 0.18359375 3.4296875 ... Z"
            transform="translate(2091,148)"
          />
          <path
            d="M0 0 C1.27294922 0.09216797 2.54589844 0.18433594 3.85742188 0.27929688 ... Z"
            transform="translate(157.55859375,663.20703125)"
          />
        </g>

        <g class="piece piece5" clip-path="url(#slice5)">
          <path
            d="M0 0 C0.06058594 1.13179687 0.12117188 2.26359375 0.18359375 3.4296875 ... Z"
            transform="translate(2091,148)"
          />
          <path
            d="M0 0 C1.27294922 0.09216797 2.54589844 0.18433594 3.85742188 0.27929688 ... Z"
            transform="translate(157.55859375,663.20703125)"
          />
        </g>
      </g>
    </svg>

    <p>Click logo to replay</p>
  </div>
</body>
</html>
